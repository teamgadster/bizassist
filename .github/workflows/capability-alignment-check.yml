name: Capability Alignment Check

'on':
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review

jobs:
  validate-capability-alignment:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run capability alignment validator
        run: bash scripts/validate-capability-alignment.sh
